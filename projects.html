<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects - Stojan Gasic</title>
  <script src="extras/tailwind.js"></script>
</head>
<body class="min-h-screen flex flex-col text-white" id="background">
  <header class="p-4 bg-black bg-opacity-30 flex justify-between items-center">
    <h1 class="text-2xl font-bold"><a href="index.html">Stojan Gasic</a></h1>
    <nav class="space-x-4">
      <button id="lang-toggle" class="px-3 py-1 bg-indigo-700 rounded">ES</button>
    </nav>
  </header>
  <main class="flex-grow p-6">
    <section id="projects" class="p-6 rounded-lg bg-white bg-opacity-10 backdrop-filter backdrop-blur-lg shadow-xl">
      <h2 class="text-3xl font-bold mb-6" id="projects-title"></h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="projects-list"></div>
    </section>
  </main>
  <footer class="text-center py-4 bg-black bg-opacity-30 text-sm">
    © 2025 Stojan Gasic
  </footer>
  <script>
    const data = {
      es: {
        projectsTitle: "🚀 Proyectos Abiertos",
        langButton: "EN",
        projectsList: [
          {
            title: "Migración a Microservicios",
            description: "Transformación de una estructura monolítica sólida en múltiples microservicios interconectados, mejorando la escalabilidad y la velocidad de implementación.",
            tech: "AWS, Kubernetes, Terraform, Java Spring Boot"
          },
          {
            title: "Desarrollo de Juego de Plataformas en Unity 3D",
            description: "Creación de un juego de plataformas utilizando Unity 3D y Blender, con mecánicas implementadas en C# que simulan una jugabilidad real.",
            tech: "Unity 3D, Blender, C#",
            link: "singame/index.html"
          },
          {
            title: "Migración de Procedimientos Almacenados",
            description: "Reestructuración de procedimientos almacenados de bases de datos a Spring Boot, logrando una arquitectura más robusta y desacoplada.",
            tech: "Spring Boot, SQL"
          },
          {
            title: "Fundación Abierta",
            description: "Creación de una organización para proyectos solidarios y experimentales que impulsen el bien común.",
            tech: "Organización social",
            link: "openfoundation/index.html"
          },
          {
            title: "Timegrafia",
            description: "Portal de infografías interactivas para visualización rápida de datos.",
            tech: "HTML5, CSS3, JavaScript",
            link: "infografias/index.html"
          }
        ]
      },
      en: {
        projectsTitle: "🚀 Open Projects",
        langButton: "ES",
        projectsList: [
          {
            title: "Microservices Migration",
            description: "Transformation of a solid monolithic structure into multiple interconnected microservices, enhancing scalability and deployment speed.",
            tech: "AWS, Kubernetes, Terraform, Java Spring Boot"
          },
          {
            title: "Platformer Game Development in Unity 3D",
            description: "Creation of a platformer game using Unity 3D and Blender, with gameplay mechanics implemented in C# to simulate real-world play.",
            tech: "Unity 3D, Blender, C#",
            link: "singame/index.html"
          },
          {
            title: "Stored Procedures Migration",
            description: "Migration of database stored procedures to Spring Boot, achieving a more robust and decoupled architecture.",
            tech: "Spring Boot, SQL"
          },
          {
            title: "Open Foundation",
            description: "Creation of a foundation to develop community projects and ethical tools for the common good.",
            tech: "Social organization",
            link: "openfoundation/index.html"
          },
          {
            title: "Timegrafia",
            description: "Interactive infographics portal for quick data visualization.",
            tech: "HTML5, CSS3, JavaScript",
            link: "infografias/index.html"
          }
        ]
      }
    };

    let currentLanguage = 'en';

    const animationHeart = `
      <svg viewBox="0 0 24 24" class="w-12 h-12">
        <path fill="#e11d48" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>
    `;

    const animation1 = `
      <svg viewBox="0 0 200 200" class="w-full h-full">
        <rect id="monolith" x="50" y="50" width="100" height="100" fill="#4f46e5"></rect>
      </svg>
    `;

    const animation2 = `
      <svg viewBox="0 0 300 150" class="w-full h-full">
        <rect x="0" y="100" width="300" height="10" fill="#374151" />
      </svg>
    `;

    const animation3 = `
      <svg viewBox="0 0 200 200" class="w-full h-full">
        <rect x="40" y="40" width="120" height="120" fill="#4f46e5"></rect>
      </svg>
    `;

    const animation4 = `
      <svg viewBox="0 0 120 100" class="w-full h-full">
        <rect x="15" y="60" width="80" height="40" fill="#4f46e5"></rect>
      </svg>
    `;

    function render() {
      const t = data[currentLanguage];
      document.documentElement.lang = currentLanguage;
      document.getElementById('projects-title').textContent = t.projectsTitle;
      document.getElementById('lang-toggle').textContent = t.langButton;
      const container = document.getElementById('projects-list');
      container.innerHTML = '';
      t.projectsList.forEach(p => {
        let anim = '';
        const title = p.title.toLowerCase();
        if (title.includes('microservicios') || title.includes('microservices')) {
          anim = animation1;
        } else if (title.includes('juego') || title.includes('platformer')) {
          anim = animation2;
        } else if (title.includes('procedimientos') || title.includes('procedures')) {
          anim = animation3;
        } else if (title.includes('infograf') || title.includes('timegrafia')) {
          anim = animation4;
        } else if (title.includes('fundaci') || title.includes('foundation')) {
          anim = animationHeart;
        }
        const div = document.createElement('div');
        div.className = 'p-6 rounded-lg bg-gradient-to-br from-indigo-800 to-purple-800 hover:from-indigo-700 hover:to-purple-700 transition-all';
        div.innerHTML = `<div class="flex justify-center mb-4 h-32">${anim}</div><h3 class="text-xl font-bold mb-2">${p.title}</h3><p class="mb-4 text-gray-200">${p.description}</p><div class="text-sm font-medium text-indigo-300">${p.tech}</div>`;
        if(p.link){
          const btn = document.createElement('a');
          btn.textContent = currentLanguage === 'es' ? 'Abrir' : 'Open';
          btn.href = p.link;
          btn.className = 'mt-3 inline-block px-2 py-1 bg-indigo-600 hover:bg-indigo-700 text-white rounded text-sm';
          div.appendChild(btn);
        }
        container.appendChild(div);
      });
    }

    document.getElementById('lang-toggle').addEventListener('click', () => {
      currentLanguage = currentLanguage === 'en' ? 'es' : 'en';
      render();
    });

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('background').classList.add('bg-gradient-to-br','from-indigo-900','to-purple-900');
      render();
    });
  </script>
</body>
</html>
