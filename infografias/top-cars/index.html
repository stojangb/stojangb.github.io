<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infografías - Autos</title>
  <script src="../extras/tailwind.js"></script>
    <style>
      .car-item { transition: transform 0.3s; }
      .car-emoji {
        font-size: 2rem;
        margin-left: 0.25rem;
        display: inline-block;
        transform: scaleX(-1);
      }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">
  <nav class="bg-indigo-700 text-white py-2">
    <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
      <a href="../index.html" class="underline">Inicio</a>
      <select id="lang-select" class="bg-indigo-600 text-white p-1 rounded">
        <option value="es">ES</option>
        <option value="en">EN</option>
      </select>
    </div>
  </nav>
  <main class="flex-grow max-w-6xl mx-auto p-4 space-y-6">
    <h1 id="page-title" class="text-4xl text-center font-bold mb-4"></h1>
    <ul id="car-list" class="space-y-4"></ul>
  </main>
  <footer class="text-center py-4 text-gray-500 text-xs">Fuente: Ventas globales 2024</footer>
  <script>
    const translations = {
      es: {
        pageTitle: "Los 10 autos más vendidos del mundo",
        year: "Año de lanzamiento",
        company: "Compañía"
      },
      en: {
        pageTitle: "Top 10 best-selling cars worldwide",
        year: "Release year",
        company: "Company"
      }
    };

    const cars = [
      { name: "Toyota Corolla", year: 1966, company: "Toyota" },
      { name: "Ford F-Series", year: 1948, company: "Ford" },
      { name: "Volkswagen Golf", year: 1974, company: "Volkswagen" },
      { name: "Honda Civic", year: 1972, company: "Honda" },
      { name: "Honda Accord", year: 1976, company: "Honda" },
      { name: "Volkswagen Passat", year: 1973, company: "Volkswagen" },
      { name: "Chevrolet Silverado", year: 1998, company: "Chevrolet" },
      { name: "Toyota RAV4", year: 1994, company: "Toyota" },
      { name: "Volkswagen Beetle", year: 1938, company: "Volkswagen" },
      { name: "Ford Escort", year: 1968, company: "Ford" }
    ];

    let currentLang = 'es';
    const states = Array(cars.length).fill(0);

    function render() {
      document.documentElement.lang = currentLang;
      document.getElementById('page-title').textContent = translations[currentLang].pageTitle;
      const list = document.getElementById('car-list');
      list.innerHTML = '';
        cars.forEach((car,i)=>{
          const li = document.createElement('li');
          li.className = 'relative h-8 cursor-pointer';
          li.innerHTML = `<div id="info-${i}" class="absolute inset-y-0 flex items-center text-sm text-gray-700"></div>
                          <div id="car-${i}" class="car-item relative">${car.name}<span class="car-emoji">🚗</span></div>`;
          li.addEventListener('click', ()=>advance(i));
          list.appendChild(li);
        });
    }

    function advance(i){
      const car = document.getElementById('car-'+i);
      const info = document.getElementById('info-'+i);
      states[i] = (states[i]+1)%3;
      if(states[i]===0){
        car.style.transform='translateX(0)';
        info.textContent='';
      }else if(states[i]===1){
        car.style.transform='translateX(6rem)';
        info.textContent = translations[currentLang].year+': '+cars[i].year;
      }else{
        car.style.transform='translateX(12rem)';
        info.textContent = translations[currentLang].year+': '+cars[i].year+' | '+translations[currentLang].company+': '+cars[i].company;
      }
    }

    document.getElementById('lang-select').addEventListener('change', e=>{
      currentLang = e.target.value;
      render();
    });

    document.addEventListener('DOMContentLoaded', ()=>{
      render();
    });
  </script>
</body>
</html>
