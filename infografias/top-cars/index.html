<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infografías - Autos</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <script src="../extras/tailwind.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Poppins', sans-serif; }
      #page-title { font-family: "Montserrat", sans-serif; }
      .car-item { transition: transform 0.3s; }
      .car-emoji {
        font-size: 2rem;
        margin-left: 0.25rem;
        display: inline-block;
        transform: scaleX(-1);
      }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">
  <nav class="bg-indigo-700 text-white py-2">
    <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
      <a href="../index.html" class="underline">Inicio</a>
      <select id="lang-select" class="bg-indigo-600 text-white p-1 rounded">
        <option value="es">ES</option>
        <option value="en">EN</option>
      </select>
    </div>
  </nav>
  <main class="flex-grow max-w-6xl mx-auto p-4 space-y-6">
    <h1 id="page-title" class="text-4xl text-center font-bold mb-4"></h1>
    <div class="flex justify-center">
      <button id="start-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white py-2 px-4 rounded mb-4">Start</button>
    </div>
    <div id="animation-area" class="h-48 relative flex flex-col items-center justify-center"></div>
    <ul id="car-list" class="space-y-4"></ul>
    <div id="descriptions" class="mt-8 space-y-2"></div>
  </main>
  <footer class="text-center py-4 text-gray-500 text-xs">Fuente: Ventas globales 2024</footer>
  <script>
    const translations = {
      es: {
        pageTitle: "Los 10 autos más vendidos del mundo",
        year: "Año de lanzamiento",
        start: "Iniciar"
      },
      en: {
        pageTitle: "Top 10 best-selling cars worldwide",
        year: "Release year",
        start: "Start"
      }
    };
    const cars = [
      { brand: "Toyota", model: "Corolla", year: 1966, desc: "El Toyota Corolla es un autom\u00f3vil compacto producido desde 1966." },
      { brand: "Ford", model: "F-Series", year: 1948, desc: "La Ford F-Series es una l\u00ednea de camionetas pickup introducida en 1948." },
      { brand: "Volkswagen", model: "Golf", year: 1974, desc: "El Volkswagen Golf es un hatchback ic\u00f3nico lanzado en 1974." },
      { brand: "Honda", model: "Civic", year: 1972, desc: "El Honda Civic es un auto compacto popular desde 1972." },
      { brand: "Honda", model: "Accord", year: 1976, desc: "El Honda Accord es un sed\u00e1n mediano introducido en 1976." },
      { brand: "Volkswagen", model: "Passat", year: 1973, desc: "El Volkswagen Passat es un sed\u00e1n familiar desde 1973." },
      { brand: "Chevrolet", model: "Silverado", year: 1998, desc: "La Chevrolet Silverado es una pickup robusta que debut\u00f3 en 1998." },
      { brand: "Toyota", model: "RAV4", year: 1994, desc: "El Toyota RAV4 es un SUV compacto presentado en 1994." },
      { brand: "Volkswagen", model: "Beetle", year: 1938, desc: "El Volkswagen Beetle es un cl\u00e1sico auto compacto lanzado en 1938." },
      { brand: "Ford", model: "Escort", year: 1968, desc: "El Ford Escort fue un auto econ\u00f3mico popular desde 1968." }
    ];

    let currentLang = 'es';
    let index = 0;
    const sortedCars = [...cars].sort((a,b)=>a.year-b.year);

    function setTexts(){
      document.documentElement.lang = currentLang;
      document.getElementById('page-title').textContent = translations[currentLang].pageTitle;
      document.getElementById('start-btn').textContent = translations[currentLang].start;
    }

    function startAnimation(){
      document.getElementById('car-list').innerHTML = '';
      document.getElementById('animation-area').innerHTML = '';
      document.getElementById('descriptions').innerHTML = '';
      index = 0;
      document.getElementById('start-btn').disabled = true;
      showNext();
    }

    function showNext(){
      if(index >= sortedCars.length){
        document.getElementById('start-btn').disabled = false;
        showDescriptions();
        return;
      }
      const car = sortedCars[index];
      const rank = index + 1;
      index++;
      const area = document.getElementById('animation-area');
      area.innerHTML = '';

      const yearDiv = document.createElement('div');
      yearDiv.className = 'text-6xl font-bold';
      yearDiv.textContent = car.year;
      area.appendChild(yearDiv);

      const carDiv = document.createElement('div');
      carDiv.className = 'text-4xl font-bold flex items-center space-x-2 mt-2';
      carDiv.style.opacity = '0';
      carDiv.innerHTML = `<span class="car-emoji">🚗</span><span>${car.brand} ${car.model}</span>`;
      area.appendChild(carDiv);

      setTimeout(()=>{
        carDiv.style.opacity = '1';
      },1000);

      setTimeout(()=>moveToList(car, rank, carDiv, yearDiv),1500);
    }

    function moveToList(car, rank, carDiv, yearDiv){
      const list = document.getElementById('car-list');
      const li = document.createElement('li');
      li.className = 'flex items-center space-x-2';
      li.innerHTML = `<span class="w-6 text-right font-bold">${rank}.</span><span class="car-emoji">🚗</span><span>${car.brand} ${car.model}</span><span class="ml-auto year">${car.year}</span>`;
      li.style.opacity = '0';
      list.appendChild(li);

      const carRect = carDiv.getBoundingClientRect();
      const yearRect = yearDiv.getBoundingClientRect();
      const liRect = li.getBoundingClientRect();
      const liYearRect = li.querySelector('.year').getBoundingClientRect();

      const carClone = carDiv.cloneNode(true);
      const yearClone = yearDiv.cloneNode(true);
      document.body.appendChild(carClone);
      document.body.appendChild(yearClone);
      Object.assign(carClone.style,{position:'absolute',top:carRect.top+'px',left:carRect.left+'px',transition:'all 0.5s ease'});
      Object.assign(yearClone.style,{position:'absolute',top:yearRect.top+'px',left:yearRect.left+'px',transition:'all 0.5s ease'});

      requestAnimationFrame(()=>{
        carClone.style.top = liRect.top+'px';
        carClone.style.left = liRect.left+'px';
        carClone.style.transform = 'scale(0.5)';
        yearClone.style.top = liYearRect.top+'px';
        yearClone.style.left = liYearRect.left+'px';
        yearClone.style.transform = 'scale(0.5)';
      });

      setTimeout(()=>{
        carClone.remove();
        yearClone.remove();
        li.style.opacity = '1';
        showNext();
      },500);
    }

    function typeText(el, text, i = 0){
      if(i < text.length){
        el.textContent += text.charAt(i);
        setTimeout(()=>typeText(el, text, i+1), 40);
      }
    }

    function showDescriptions(){
      const container = document.getElementById('descriptions');
      container.innerHTML = '';
      sortedCars.forEach((c, idx)=>{
        const p = document.createElement('p');
        container.appendChild(p);
        const text = `${idx+1}. ${c.year} - ${c.brand} ${c.model}: ${c.desc}`;
        typeText(p, text);
      });
    }

    document.getElementById('lang-select').addEventListener('change', e=>{
      currentLang = e.target.value;
      setTexts();
    });

    document.getElementById('start-btn').addEventListener('click', startAnimation);

    document.addEventListener('DOMContentLoaded', ()=>{
      setTexts();
    });
  </script>
</body>
</html>
