<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timegrafia - Choritos en Puerto Montt</title>
  <script src="../extras/tailwind.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    #map { height: 20rem; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">
  <nav class="bg-indigo-700 text-white py-2">
    <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
      <a href="../index.html" class="underline">Inicio</a>
      <select id="lang-select" class="bg-indigo-600 text-white p-1 rounded">
        <option value="es">ES</option>
        <option value="en">EN</option>
      </select>
    </div>
  </nav>
  <main class="flex-grow max-w-6xl mx-auto p-4 space-y-6">
    <h1 id="page-title" class="text-3xl text-center font-bold mb-4"></h1>
    <p class="text-center mb-4" id="intro"></p>
    <ul id="facts" class="list-disc pl-6 space-y-1"></ul>
    <section class="grid md:grid-cols-2 gap-4">
      <div>
        <canvas id="prodChart" height="200"></canvas>
      </div>
      <div>
        <canvas id="expChart" height="200"></canvas>
      </div>
    </section>
    <div id="map" class="w-full rounded shadow"></div>
    <table class="w-full mt-4 table-auto bg-white rounded shadow">
      <thead class="bg-indigo-600 text-white">
        <tr><th id="nutrient" class="p-2 text-left"></th><th id="amount" class="p-2 text-left"></th></tr>
      </thead>
      <tbody id="nutri-body"></tbody>
    </table>
  </main>
  <footer class="text-center py-4 text-gray-500 text-xs">Fuente: estimaciones 2024</footer>
  <script>
const translations = {
  es: {
    pageTitle: 'Choritos en Puerto Montt',
    prodLabel: 'Producción (miles de toneladas)',
    expLabel: 'Exportaciones %',
    nutrient: 'Nutriente',
    amount: 'Cantidad por 100g',
    intro: 'Mytilus chilensis se cultiva de forma industrial desde 1979 y hoy Puerto Montt aporta cerca de un cuarto de la cosecha regional.',
    unlockMsg: 'Arrastra el chorito para revelar datos',
    facts: [
      'Vive desde Per\u00fa hasta Tierra del Fuego y se cultiva hasta 10 m de profundidad',
      'La industria se inici\u00f3 en 1979; para 2007 alcanz\u00f3 170 mil toneladas',
      'Producci\u00f3n 2019: 379.096 t (26,9% de la acuicultura nacional)',
      'Los Lagos genera m\u00e1s del 56% de la producci\u00f3n chilena',
      'Puerto Montt cosech\u00f3 3.678 t en nov 2023 y 698 t en sep 2024',
      'Exportaciones nov 2023: USD 15M; Espa\u00f1a 24,8%',
      'Exportaciones 2023: USD 14,7M (Rusia 22%, Espa\u00f1a 18%)',
      'Desde 2015 se exportan 289 mil t y USD 202M',
      'La actividad sostiene a unas 17 mil familias',
      'El "Sem\u00e1foro de la Semilla" ayuda a optimizar la captaci\u00f3n'
    ]
  },
  en: {
    pageTitle: 'Mussels in Puerto Montt',
    prodLabel: 'Production (thousand tons)',
    expLabel: 'Exports %',
    nutrient: 'Nutrient',
    amount: 'Amount per 100g',
    intro: 'Mytilus chilensis has been farmed industrially since 1979 and Puerto Montt now provides about a quarter of the region\'s harvest.',
    unlockMsg: 'Drag the mussel to reveal facts',
    facts: [
      'Lives from Peru to Tierra del Fuego and is farmed up to 10 m deep',
      'Industry began in 1979 and reached 170k tons by 2007',
      '2019 output: 379,096 t (26.9% of Chilean aquaculture)',
      'Los Lagos region supplies over 56% of the country\'s mussels',
      'Puerto Montt harvested 3,678 t in Nov 2023 and 698 t in Sep 2024',
      'Exports Nov 2023: USD 15M; Spain 24.8%',
      '2023 exports: USD 14.7M (Russia 22%, Spain 18%)',
      'Since 2015 roughly 289k t worth USD 202M exported',
      'About 17,000 families rely on mussel farming',
      'Tools like the "Sem\u00e1foro de la Semilla" optimize seed capture'
    ]
  }
};

const production = [
  {year: 1990, tons: 2.1},
  {year: 2006, tons: 116},
  {year: 2007, tons: 170},
  {year: 2015, tons: 289.1},
  {year: 2019, tons: 379.1},
  {year: 2023, tons: 17.6},
  {year: 2024, tons: 0.7}
];

const exportsData = [
  {name:'Rusia',value:22},
  {name:'España',value:18},
  {name:'Otros',value:60}
];

const nutrients = [
  {name:'Proteína',value:'24 g'},
  {name:'Grasa',value:'4 g'},
  {name:'Hierro',value:'3 mg'},
  {name:'Calcio',value:'50 mg'}
];

let currentLang = 'es';
let prodChart, expChart, mapInstance;
let unlockInitialized = false;
let unlocked = 0, factsEls = [];

function setTexts(){
  const t = translations[currentLang];
  document.documentElement.lang = currentLang;
  document.getElementById('page-title').textContent = t.pageTitle;
  prodChart.options.plugins.title.text = t.prodLabel;
  prodChart.update();
  expChart.options.plugins.title.text = t.expLabel;
  expChart.update();
  document.getElementById('nutrient').textContent = t.nutrient;
  document.getElementById('amount').textContent = t.amount;
  document.getElementById('intro').textContent = t.intro;
  const factsList = document.getElementById('facts');
  factsList.innerHTML = '';
  t.facts.forEach(f => {
    const li = document.createElement('li');
    li.textContent = f;
    li.classList.add('hidden');
    factsList.appendChild(li);
  });
  factsEls = Array.from(factsList.children);
  unlocked = 0;
  document.getElementById('progress').style.width = '0%';
  document.getElementById('mussel').style.transform = 'translateX(0)';
  document.getElementById('unlock-msg').textContent = t.unlockMsg;
  if (!unlockInitialized) { initUnlock(); unlockInitialized = true; }
}

document.getElementById('lang-select').addEventListener('change', e=>{
  currentLang = e.target.value;
  setTexts();
});

function initCharts(){
  const prodCtx = document.getElementById('prodChart');
  prodChart = new Chart(prodCtx, {
    type: 'line',
    data: {
      labels: production.map(p=>p.year),
      datasets: [{
        label: translations[currentLang].prodLabel,
        data: production.map(p=>p.tons),
        backgroundColor: 'rgba(54, 162, 235, 0.5)',
        borderColor: 'rgba(54,162,235,1)',
        fill: true
      }]
    },
    options: {
      responsive: true,
      plugins: { title: { display: true, text: translations[currentLang].prodLabel } }
    }
  });

  const expCtx = document.getElementById('expChart');
  expChart = new Chart(expCtx, {
    type: 'pie',
    data: {
      labels: exportsData.map(e=>e.name),
      datasets: [{
        data: exportsData.map(e=>e.value),
        backgroundColor: ['#4f46e5','#16a34a','#dc2626','#facc15','#7e22ce']
      }]
    },
    options: {
      plugins: { title: { display: true, text: translations[currentLang].expLabel } }
    }
  });
}

function initMap(){
  mapInstance = L.map('map').setView([-41.469,-72.942], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(mapInstance);
  L.marker([-41.469,-72.942]).addTo(mapInstance)
    .bindPopup('Puerto Montt').openPopup();
  setTimeout(()=>{ mapInstance.invalidateSize(); }, 100);
}

function fillTable(){
  const tbody = document.getElementById('nutri-body');
  nutrients.forEach(n=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `<td class="border p-2">${n.name}</td><td class="border p-2">${n.value}</td>`;
    tbody.appendChild(tr);
  });
}

function initUnlock(){
  const mussel = document.getElementById('mussel');
  const progress = document.getElementById('progress');
  let dragging = false, startX = 0;
  mussel.addEventListener('pointerdown', e=>{
    dragging = true;
    startX = e.clientX;
    mussel.setPointerCapture(e.pointerId);
  });
  mussel.addEventListener('pointermove', e=>{
    if(!dragging) return;
    let dx = e.clientX - startX;
    if(dx < 0) dx = 0;
    if(dx > 200) dx = 200;
    mussel.style.transform = `translateX(${dx}px)`;
    progress.style.width = `${dx/2}%`;
    while(unlocked < factsEls.length && dx > (unlocked+1)*20){
      factsEls[unlocked].classList.remove('hidden');
      unlocked++;
      if(unlocked === factsEls.length){
        document.getElementById('unlock-msg').textContent = '';
      }
    }
  });
  mussel.addEventListener('pointerup', e=>{
    dragging = false;
    mussel.releasePointerCapture(e.pointerId);
  });
}

document.addEventListener('DOMContentLoaded', ()=>{
  initCharts();
  initMap();
  fillTable();
  setTexts();
});
  </script>
</body>
</html>
