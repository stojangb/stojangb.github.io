<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timegrafia - Choritos en Puerto Montt</title>
  <script src="../extras/tailwind.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    #map { height: 20rem; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">
  <nav class="bg-indigo-700 text-white py-2">
    <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
      <a href="../index.html" class="underline">Inicio</a>
      <select id="lang-select" class="bg-indigo-600 text-white p-1 rounded">
        <option value="es">ES</option>
        <option value="en">EN</option>
      </select>
    </div>
  </nav>
  <main class="flex-grow max-w-6xl mx-auto p-4 space-y-6">
    <h1 id="page-title" class="text-3xl text-center font-bold mb-4"></h1>
    <p class="text-center mb-4" id="intro"></p>
    <section class="grid md:grid-cols-2 gap-4">
      <div>
        <canvas id="prodChart" height="200"></canvas>
      </div>
      <div>
        <canvas id="expChart" height="200"></canvas>
      </div>
    </section>
    <div id="map" class="w-full rounded shadow"></div>
    <table class="w-full mt-4 table-auto bg-white rounded shadow">
      <thead class="bg-indigo-600 text-white">
        <tr><th id="nutrient" class="p-2 text-left"></th><th id="amount" class="p-2 text-left"></th></tr>
      </thead>
      <tbody id="nutri-body"></tbody>
      </table>
      <div id="facts-container" class="relative bg-white rounded shadow p-4 mt-6">
        <p id="drag-instruction" class="text-center italic mb-2"></p>
        <div id="mussel" class="absolute top-0 left-0 w-8 h-8 bg-indigo-700 text-white flex items-center justify-center rounded-full cursor-pointer select-none">🦪</div>
        <ul id="facts" class="ml-12 space-y-2 text-sm list-disc"></ul>
      </div>
    </main>
  <footer class="text-center py-4 text-gray-500 text-xs">Fuente: estimaciones 2024</footer>
  <script>
const translations = {
  es: {
    pageTitle: 'Choritos en Puerto Montt',
    prodLabel: 'Producción (miles de toneladas)',
    expLabel: 'Exportaciones %',
    nutrient: 'Nutriente',
    amount: 'Cantidad por 100g',
    intro: 'Mytilus chilensis se cultiva de forma industrial desde 1979 y hoy Puerto Montt aporta cerca de un cuarto de la cosecha regional.',
    drag: 'Arrastra el chorito para descubrir datos'
  },
  en: {
    pageTitle: 'Mussels in Puerto Montt',
    prodLabel: 'Production (thousand tons)',
    expLabel: 'Exports %',
    nutrient: 'Nutrient',
    amount: 'Amount per 100g',
    intro: 'Mytilus chilensis has been farmed industrially since 1979 and Puerto Montt now provides about a quarter of the region\'s harvest.',
    drag: 'Drag the mussel to reveal facts'
  }
};

const factsData = {
  es: [
    'Especie Mytilus chilensis presente en costas de Chile y Argentina.',
    'La producción en 2019 fue 379\u00A0096 t (26,9% nacional).',
    'Los Lagos aporta m\u00E1s del 56% y Puerto Montt alrededor del 20–25%.',
    'Exportaciones de USD 202M en 2015 y 15M en nov 2023; Espa\u00F1a y Rusia destacan.',
    'La mitilicultura sustenta a 17\u00A0000 familias con 12\u00A0000 empleos directos.',
    'Innovaciones como el \u201CSem\u00E1foro de la Semilla\u201D optimizan la captaci\u00F3n.'
  ],
  en: [
    'Species Mytilus chilensis found along Chile and Argentina.',
    'Production in 2019 reached 379,096 t (26.9% of national aquaculture).',
    'Los Lagos provides over 56% and Puerto Montt about 20–25%.',
    'Exports totaled USD 202M in 2015 and 15M in Nov 2023; Spain and Russia lead.',
    'Mussel farming supports 17,000 families with 12,000 direct jobs.',
    'Innovations such as the \u201CSeed Traffic Light\u201D help optimize seed collection.'
  ]
};

const production = [
  {year: 1990, tons: 2.1},
  {year: 2006, tons: 116},
  {year: 2007, tons: 170},
  {year: 2019, tons: 379.1},
  {year: 2023, tons: 17.6},
  {year: 2024, tons: 0.7}
];

const exportsData = [
  {name:'Rusia',value:22},
  {name:'España',value:18},
  {name:'Otros',value:60}
];

const nutrients = [
  {name:'Proteína',value:'24 g'},
  {name:'Grasa',value:'4 g'},
  {name:'Hierro',value:'3 mg'},
  {name:'Calcio',value:'50 mg'}
];

let currentLang = 'es';
let prodChart, expChart, mapInstance;
let showIndex = 0;

function setTexts(){
  const t = translations[currentLang];
  document.documentElement.lang = currentLang;
  document.getElementById('page-title').textContent = t.pageTitle;
  prodChart.options.plugins.title.text = t.prodLabel;
  prodChart.update();
  expChart.options.plugins.title.text = t.expLabel;
  expChart.update();
  document.getElementById('nutrient').textContent = t.nutrient;
  document.getElementById('amount').textContent = t.amount;
  document.getElementById('intro').textContent = t.intro;
  document.getElementById('drag-instruction').textContent = t.drag;
  populateFacts();
}

document.getElementById('lang-select').addEventListener('change', e=>{
  currentLang = e.target.value;
  setTexts();
  populateFacts();
});

function initCharts(){
  const prodCtx = document.getElementById('prodChart');
  prodChart = new Chart(prodCtx, {
    type: 'line',
    data: {
      labels: production.map(p=>p.year),
      datasets: [{
        label: translations[currentLang].prodLabel,
        data: production.map(p=>p.tons),
        backgroundColor: 'rgba(54, 162, 235, 0.5)',
        borderColor: 'rgba(54,162,235,1)',
        fill: true
      }]
    },
    options: {
      responsive: true,
      plugins: { title: { display: true, text: translations[currentLang].prodLabel } }
    }
  });

  const expCtx = document.getElementById('expChart');
  expChart = new Chart(expCtx, {
    type: 'pie',
    data: {
      labels: exportsData.map(e=>e.name),
      datasets: [{
        data: exportsData.map(e=>e.value),
        backgroundColor: ['#4f46e5','#16a34a','#dc2626','#facc15','#7e22ce']
      }]
    },
    options: {
      plugins: { title: { display: true, text: translations[currentLang].expLabel } }
    }
  });
}

function initMap(){
  mapInstance = L.map('map').setView([-41.469,-72.942], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(mapInstance);
  L.marker([-41.469,-72.942]).addTo(mapInstance)
    .bindPopup('Puerto Montt').openPopup();
  setTimeout(()=>{ mapInstance.invalidateSize(); }, 100);
}

function fillTable(){
  const tbody = document.getElementById('nutri-body');
  nutrients.forEach(n=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `<td class="border p-2">${n.name}</td><td class="border p-2">${n.value}</td>`;
    tbody.appendChild(tr);
  });
}

function populateFacts(){
  const ul = document.getElementById('facts');
  ul.innerHTML = '';
  factsData[currentLang].forEach(text => {
    const li = document.createElement('li');
    li.textContent = text;
    li.classList.add('hidden');
    ul.appendChild(li);
  });
  showIndex = 0;
  document.getElementById('mussel').style.left = '0px';
}

function initDrag(){
  const container = document.getElementById('facts-container');
  const mussel = document.getElementById('mussel');
  const ul = document.getElementById('facts');
  let dragging = false;
  function reveal(idx){
    const items = ul.querySelectorAll('li');
    for(let i=0;i<items.length;i++){
      if(i<=idx) items[i].classList.remove('hidden');
    }
  }
  mussel.addEventListener('pointerdown', e=>{ dragging=true; mussel.setPointerCapture(e.pointerId); });
  mussel.addEventListener('pointerup', e=>{ dragging=false; mussel.releasePointerCapture(e.pointerId); });
  mussel.addEventListener('pointermove', e=>{
    if(!dragging) return;
    const rect = container.getBoundingClientRect();
    let x = e.clientX - rect.left - mussel.offsetWidth/2;
    x = Math.max(0, Math.min(x, rect.width - mussel.offsetWidth));
    mussel.style.left = x + 'px';
    const idx = Math.floor(x / (rect.width - mussel.offsetWidth) * factsData[currentLang].length);
    reveal(idx);
  });
}

document.addEventListener('DOMContentLoaded', ()=>{
  initCharts();
  initMap();
  fillTable();
  setTexts();
  initDrag();
});
  </script>
</body>
</html>
