let currentLang = 'es';
let barChart = null;
let continentChart = null;

function drawCharts() {
  const barCtx = document.getElementById('heightChart').getContext('2d');
  const labels = companies.map(b => b.name);
  const heights = companies.map(b => b.value);
  if (barChart) barChart.destroy();
  barChart = new Chart(barCtx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: translations[currentLang].heightLabel,
        data: heights,
        backgroundColor: 'rgba(99,102,241,0.7)'
      }]
    },
    options: {
      scales: { y: { beginAtZero: true } }
    }
  });

  const counts = {};
  companies.forEach(b => { counts[b.sector] = (counts[b.sector] || 0) + 1; });
  const cLabels = Object.keys(counts);
  const cData = Object.values(counts);
  const contCtx = document.getElementById('continentChart').getContext('2d');
  if (continentChart) continentChart.destroy();
  continentChart = new Chart(contCtx, {
    type: 'doughnut',
    data: {
      labels: cLabels,
      datasets: [{
        data: cData,
        backgroundColor: ['#6366f1','#f59e0b','#10b981','#ef4444','#3b82f6']
      }]
    },
    options: { plugins: { legend: { position: 'bottom' } } }
  });
}

function createCards() {
  const container = document.getElementById('cards');
  container.innerHTML = '';
  companies.forEach((b, idx) => {
    const card = document.createElement('div');
    card.id = 'card-'+idx;
    card.className = 'bg-white shadow rounded overflow-hidden flex flex-col';
    card.innerHTML = `
      <img id="build-${idx}" alt="${b.name}" class="w-full h-40 object-cover">
      <div class="p-4 flex-1 flex flex-col">
        <h3 class="text-xl font-semibold mb-2">${b.name}</h3>
        <p class="text-sm mb-1"><strong>${translations[currentLang].country}:</strong> ${currentLang==='es'?b.country_es:b.country_en}</p>
        <p class="text-sm mb-1"><strong>${translations[currentLang].city}:</strong> ${b.city}</p>
        <p class="text-sm mb-1"><strong>${translations[currentLang].occupancy}:</strong> ${b.founded}</p>
        <p class="text-sm mb-1"><strong>${translations[currentLang].sector}:</strong> ${currentLang==='es'?b.sector:b.sector_en}</p>
        <div class="flex items-center mt-2">
          <img id="arch-${idx}" alt="${b.ceo}" class="w-12 h-12 rounded-full object-cover mr-2">
          <p class="font-semibold text-sm">${translations[currentLang].architect}: ${b.ceo}</p>
        </div>
        <div class="mt-auto space-x-2">
          <button data-idx="${idx}" data-type="building" class="view-more-building bg-indigo-600 hover:bg-indigo-700 text-white px-2 py-1 rounded text-sm">${translations[currentLang].viewMore}</button>
          <button data-idx="${idx}" data-type="architect" class="view-more-arch bg-indigo-600 hover:bg-indigo-700 text-white px-2 py-1 rounded text-sm">${translations[currentLang].viewMore}</button>
        </div>
        <div id="building-detail-${idx}" class="hidden mt-2 text-sm"></div>
        <div id="architect-detail-${idx}" class="hidden mt-2 text-sm"></div>
      </div>`;
    container.appendChild(card);
    document.getElementById(`building-detail-${idx}`).textContent = currentLang==='es'?b.info_es:b.info_en;
    document.getElementById(`architect-detail-${idx}`).textContent = currentLang==='es'?b.bio_es:b.bio_en;
    card.querySelector('.view-more-building').addEventListener('click', () => {
      const d = document.getElementById('building-detail-'+idx);
      d.classList.toggle('hidden');
      if(!d.classList.contains('hidden')) d.classList.add('fade-in');
    });
    card.querySelector('.view-more-arch').addEventListener('click', () => {
      const d = document.getElementById('architect-detail-'+idx);
      d.classList.toggle('hidden');
      if(!d.classList.contains('hidden')) d.classList.add('fade-in');
    });
    fetch(b.companyImage)
      .then(r => r.text())
      .then(data => {
        document.getElementById(`build-${idx}`).src =
          'data:image/jpeg;base64,' + data.trim();
      });
    fetch(b.ceoImage)
      .then(r => r.text())
      .then(data => {
        document.getElementById(`arch-${idx}`).src =
          'data:image/jpeg;base64,' + data.trim();
      });
  });
}

let mapInstance = null;
function createMap() {
  if (mapInstance) { mapInstance.remove(); }
  mapInstance = L.map('map', {
    maxBounds: [[-60,-180],[80,180]],
    maxBoundsViscosity: 1.0,
    minZoom: 2,
    maxZoom: 7,
    worldCopyJump: true
  }).setView([20,0], 2);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(mapInstance);
  companies.forEach((b,idx) => {
    L.marker([b.lat, b.lng]).addTo(mapInstance)
      .bindTooltip(b.name)
      .on('click', () => showBuildingOnMap(idx));
  });
  setTimeout(()=>{ mapInstance.invalidateSize(); },100);
}

function showBuildingOnMap(idx) {
  const b = companies[idx];
  const info = document.getElementById('map-info');
  const card = document.getElementById('card-'+idx);
  info.innerHTML = `
    <div class="flex justify-between items-center mb-2">
      <h3 class="text-xl font-semibold">${b.name}</h3>
      <button id="close-map-info" class="text-red-600 font-bold">X</button>
    </div>
    <p class="text-sm"><strong>${translations[currentLang].country}:</strong> ${currentLang==='es'?b.country_es:b.country_en}</p>
    <p class="text-sm"><strong>${translations[currentLang].city}:</strong> ${b.city}</p>
    <p class="mt-2 text-sm">${currentLang==='es'?b.info_es:b.info_en}</p>`;
  info.classList.remove('hidden');
  if(card) card.classList.add('hidden');
  document.getElementById('close-map-info').addEventListener('click', () => {
    info.classList.add('hidden');
    if(card) card.classList.remove('hidden');
  }, { once: true });
}

function updateLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang;
  const t = translations[lang];
  document.getElementById('page-title').textContent = t.pageTitle;
  document.getElementById('height-label').textContent = t.heightLabel;
  document.getElementById('continents-title').textContent = t.continentsTitle;
  document.getElementById('map-info').classList.add('hidden');
  document.getElementById('cards').classList.remove('hidden');
  drawCharts();
  createCards();
  createMap();
}

document.getElementById('lang-select').addEventListener('change', e => {
  updateLang(e.target.value);
});

document.addEventListener('DOMContentLoaded', () => {
  updateLang('es');
});
