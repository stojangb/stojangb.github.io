<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="seed" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="48" fill="none" stroke="currentColor" stroke-width="4"/>
    <ellipse cx="50" cy="50" rx="10" ry="20" fill="currentColor"/>
  </symbol>
  <symbol id="juvenile" viewBox="0 0 100 100">
    <path d="M30 50c0-15 20-30 40-20 0 0-10 40-40 40z" fill="currentColor"/>
    <circle cx="70" cy="30" r="12" fill="none" stroke="currentColor" stroke-width="5"/>
    <line x1="78" y1="38" x2="90" y2="50" stroke="currentColor" stroke-width="5"/>
  </symbol>
  <symbol id="grow" viewBox="0 0 100 100">
    <line x1="50" y1="10" x2="50" y2="90" stroke="currentColor" stroke-width="6"/>
    <rect x="30" y="20" width="40" height="60" fill="none" stroke="currentColor" stroke-width="4" stroke-dasharray="4 4"/>
  </symbol>
  <symbol id="harvest" viewBox="0 0 100 100">
    <circle cx="30" cy="30" r="20" fill="none" stroke="currentColor" stroke-width="4"/>
    <line x1="30" y1="50" x2="30" y2="90" stroke="currentColor" stroke-width="6"/>
    <line x1="30" y1="60" x2="70" y2="80" stroke="currentColor" stroke-width="6"/>
  </symbol>
  <symbol id="export" viewBox="0 0 100 100">
    <rect x="10" y="30" width="80" height="40" fill="none" stroke="currentColor" stroke-width="4"/>
    <path d="M10 70 q40 20 80 0" fill="none" stroke="currentColor" stroke-width="4"/>
  </symbol>
  <symbol id="bubble" viewBox="0 0 20 20">
    <circle cx="10" cy="10" r="8" fill="currentColor"/>
  </symbol>
