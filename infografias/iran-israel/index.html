<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infografías - Irán vs Israel</title>
  <script src="../extras/tailwind.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">
  <nav class="bg-indigo-700 text-white py-2">
    <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
      <a href="../index.html" class="underline">Inicio</a>
      <select id="lang-select" class="bg-indigo-600 text-white p-1 rounded">
        <option value="es">ES</option>
        <option value="en">EN</option>
      </select>
    </div>
  </nav>
  <main class="flex-grow max-w-6xl mx-auto p-4 space-y-6">
    <h1 id="page-title" class="text-4xl text-center font-bold mb-4"></h1>
    <canvas id="barChart" height="250"></canvas>
    <p id="notes" class="text-center text-xs text-gray-600"></p>
  </main>
  <footer class="text-center py-4 text-gray-500 text-xs">2024</footer>
<script>
const translations = {
  es: {
    pageTitle: 'Comparativa de poder militar: Irán vs Israel',
    notes: 'Datos aproximados de fuentes públicas (2024)',
    labels: ['Personal activo (miles)', 'Presupuesto (B USD)', 'Tanques', 'Aeronaves de combate', 'Submarinos', 'Ojivas nucleares'],
    iran: 'Irán',
    israel: 'Israel'
  },
  en: {
    pageTitle: 'Military power comparison: Iran vs Israel',
    notes: 'Approximate data from public sources (2024)',
    labels: ['Active personnel (k)', 'Budget (B USD)', 'Tanks', 'Combat aircraft', 'Submarines', 'Nuclear warheads'],
    iran: 'Iran',
    israel: 'Israel'
  }
};

const data = {
  iran: [610, 25, 1600, 350, 19, 0],
  israel: [170, 24, 1600, 600, 5, 90]
};

let currentLang = 'es';
let chart;

function drawChart(){
  const ctx = document.getElementById('barChart').getContext('2d');
  if(chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: translations[currentLang].labels,
      datasets: [
        { label: translations[currentLang].iran, data: data.iran, backgroundColor: 'rgba(220,38,38,0.7)' },
        { label: translations[currentLang].israel, data: data.israel, backgroundColor: 'rgba(37,99,235,0.7)' }
      ]
    },
    options: {
      responsive: true,
      scales: { y: { beginAtZero: true } }
    }
  });
}

function updateLang(lang){
  currentLang = lang;
  const t = translations[lang];
  document.documentElement.lang = lang;
  document.getElementById('page-title').textContent = t.pageTitle;
  document.getElementById('notes').textContent = t.notes;
  drawChart();
}

document.getElementById('lang-select').addEventListener('change', e => updateLang(e.target.value));

document.addEventListener('DOMContentLoaded', () => updateLang('es'));
</script>
</body>
</html>
