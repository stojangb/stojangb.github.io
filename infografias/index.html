<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infographics</title>
  <script src="extras/tailwind.js"></script>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag("js", new Date());
    gtag("config", "G-XXXXXXXXXX");
  </script>
  <style>
    .infographic-card {
      background: white;
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      position: relative;
    }
    .badge-new {
      position: absolute;
      top: 12px;
      left: 12px;
      background: #007BFF;
      color: white;
      padding: 2px 8px;
      font-size: 0.75rem;
      border-radius: 6px;
    }
  </style>

</head>
<body class="bg-gray-100 min-h-screen flex flex-col">
  <header class="flex justify-between items-center p-4 bg-white shadow">
    <h1 class="text-2xl font-bold">Infographics</h1>
    <nav class="space-x-4">
      <a href="#">About</a>
      <a href="#">Pricing</a>
      <a href="#">Contact</a>
      <button class="hamburger-menu">☰</button>
    </nav>
  </header>
  <main class="flex-grow grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 p-4" id="posts"></main>
  <script>
const posts = [
  {
    title: 'Los 10 edificios más altos del mundo',
    link: 'tallest-buildings/',
    date: '2025-06-10',
    image: 'image_data/building1.txt'
  },
  {
    title: 'Las 10 empresas más importantes del mundo',
    link: 'top-companies/',
    date: '2025-06-11',
    image: 'image_data/company1.txt'
  },
  {
    title: 'Los 10 autos más vendidos del mundo',
    link: 'top-cars/',
    date: '2025-06-12',
    image: 'image_data/building1.txt'
  },
  {
    title: 'Comparativa militar Irán vs Israel',
    link: 'iran-israel/',
    date: '2025-06-13',
    image: 'image_data/building2.txt'
  }
];
posts.sort((a,b)=> new Date(b.date)-new Date(a.date));
const container = document.getElementById('posts');
posts.forEach((p, idx)=>{
  const card = document.createElement('a');
  card.href = p.link;
  card.className = 'infographic-card block';
  const date = new Date(p.date).toLocaleDateString('en-US', { day: 'numeric', month: 'long' });
  card.innerHTML = `${idx===0?'<div class="badge-new">New</div>':''}<h2 class="date mb-2">${date}</h2><div class="content"><img id="img-${idx}" class="w-full h-40 object-cover rounded" /></div><h3 class="mt-2 font-semibold">${p.title}</h3>`;
  container.appendChild(card);
  fetch(p.image).then(r=>r.text()).then(d=>{document.getElementById(`img-${idx}`).src='data:image/jpeg;base64,'+d.trim();});
});
  </script>
</body>
</html>
