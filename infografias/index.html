<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infografías</title>
  <script src="extras/tailwind.js"></script>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag("js", new Date());
    gtag("config", "G-XXXXXXXXXX");
  </script>

</head>
<body class="bg-gray-100 min-h-screen flex flex-col">
  <header class="bg-indigo-700 text-white py-4">
    <div class="max-w-6xl mx-auto px-4">
      <h1 class="text-2xl font-bold">Dashboard de Infografías</h1>
    </div>
  </header>
  <main class="flex-grow max-w-6xl mx-auto p-4" id="posts"></main>
  <script>
const posts = [
  {
    title: 'Los 10 edificios más altos del mundo',
    link: 'tallest-buildings/',
    date: '2025-06-10',
    image: 'image_data/building1.txt'
  },
  {
    title: 'Las 10 empresas más importantes del mundo',
    link: 'top-companies/',
    date: '2025-06-11',
    image: 'image_data/company1.txt'
  },
  {
    title: 'Los 10 autos más vendidos del mundo',
    link: 'top-cars/',
    date: '2025-06-12',
    image: 'image_data/building1.txt'
  }
];
posts.sort((a,b)=> new Date(b.date)-new Date(a.date));
const container = document.getElementById('posts');
posts.forEach((p, idx)=>{
  const card = document.createElement('a');
  card.href = p.link;
  card.className = 'block bg-white rounded shadow mb-4 overflow-hidden hover:shadow-lg transition';
  card.innerHTML = `<div class="h-48 w-full overflow-hidden"><img id="img-${idx}" class="w-full h-full object-cover" /></div><div class="p-4"><h2 class="text-xl font-semibold mb-1">${p.title}</h2><p class="text-sm text-gray-600">${p.date}</p></div>`;
  container.appendChild(card);
  fetch(p.image).then(r=>r.text()).then(d=>{document.getElementById(`img-${idx}`).src='data:image/jpeg;base64,'+d.trim();});
});
  </script>
</body>
</html>
