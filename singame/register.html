<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your Singame account using Google" />
  <title>Register - Singame</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <script src="../extras/tailwind.js" defer></script>
  <!-- Google Analytics -->
  <script src="../extras/ga.js" defer></script>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body { background:#0e112f; color:#cfd9ff; font-family:'Poppins',sans-serif; }
    .container { max-width:400px; margin:80px auto; padding:20px; background:#1b1b3a; border-radius:8px; box-shadow:0 0 10px #5514b4; }
    label { display:block; margin-bottom:10px; }
    input { width:100%; padding:8px; margin-top:4px; border-radius:4px; }
    button { margin-top:10px; background:#5514b4; padding:10px 20px; border-radius:9999px; }
    .message { margin-top:10px; }
  </style>
</head>
<body>
  <div class="container">
    <button id="lang-toggle" class="float-right mb-2 bg-indigo-700 px-3 py-1 rounded" data-lang="en">ES</button>
    <h1 class="text-2xl font-bold mb-4 text-center" data-es="Registro">Register</h1>
    <div id="g_id_onload"
         data-client_id="YOUR_GOOGLE_CLIENT_ID"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
    </div>
    <div class="g_id_signin" data-type="standard"></div>
    <form id="registration-form">
      <label data-es="Usuario">Username
        <input type="text" id="username" required>
      </label>
      <label data-es="Contraseña">Password
        <input type="password" id="password" required>
      </label>
      <button type="submit" class="w-full" data-es="Registrar">Register</button>
    </form>
    <div id="message" class="message text-center"></div>
  </div>
<script>
  const form = document.getElementById('registration-form');
  const msg = document.getElementById('message');
  let currentLang = 'en';
  const messages = {
    en: {
      successGoogle: name => `Successfully registered as ${name}`,
      googleError: 'Error processing Google login',
      fillAll: 'Fill all fields',
      exists: 'User already exists',
      success: 'Registration successful'
    },
    es: {
      successGoogle: name => `Registro exitoso como ${name}`,
      googleError: 'Error procesando el inicio de sesión con Google',
      fillAll: 'Completa todos los campos',
      exists: 'El usuario ya existe',
      success: 'Registro exitoso'
    }
  };
  document.querySelectorAll('[data-es]').forEach(el => { el.dataset.en = el.textContent; });
  const toggle = document.getElementById('lang-toggle');
  if (toggle) {
    toggle.addEventListener('click', () => {
      currentLang = currentLang === 'es' ? 'en' : 'es';
      toggle.textContent = currentLang === 'es' ? 'EN' : 'ES';
      document.documentElement.lang = currentLang;
      document.querySelectorAll('[data-es]').forEach(el => { el.textContent = el.dataset[currentLang]; });
    });
  }

  function handleCredentialResponse(response) {
    try {
      const data = JSON.parse(atob(response.credential.split('.')[1]));
      const users = JSON.parse(localStorage.getItem('googleUsers') || '{}');
      users[data.sub] = { name: data.name, email: data.email, picture: data.picture };
      localStorage.setItem('googleUsers', JSON.stringify(users));
      msg.textContent = messages[currentLang].successGoogle(data.name);
    } catch (e) {
      msg.textContent = messages[currentLang].googleError;
    }
  }
  form.addEventListener('submit', e => {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    if (!username || !password) {
      msg.textContent = messages[currentLang].fillAll;
      return;
    }
    const users = JSON.parse(localStorage.getItem('users') || '{}');
    if (users[username]) {
      msg.textContent = messages[currentLang].exists;
      return;
    }
    users[username] = { password };
    localStorage.setItem('users', JSON.stringify(users));
    msg.textContent = messages[currentLang].success;
    form.reset();
  });
</script>
</body>
</html>
