<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Singame</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap" rel="stylesheet">
  <script src="../extras/tailwind.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to bottom right, #0e112f, #1b1b3a);
      color: #cfd9ff;
    }
    .neon-text {
      text-shadow: 0 0 5px #fff, 0 0 10px #9f6aff, 0 0 20px #9f6aff;
    }
    #singame-hero {
      background: linear-gradient(to right, #1b1b3a, #262b63);
      color: white;
      padding: 4rem 1rem;
      text-align: center;
    }
    .hero-btn {
      background: #5514b4;
      border-radius: 9999px;
      padding: 1rem 2rem;
      margin: 0 0.5rem;
      box-shadow: 0 0 10px #5514b4;
      transition: background 0.3s;
    }
    .hero-btn:hover {
      background: #7b1fa2;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">
  <section id="singame-hero">
    <h1 class="text-6xl font-bold neon-text">SINGAME</h1>
    <p class="mt-2 text-xl">Somos una empresa de videojuegos que impulsa la inteligencia artificial en el gaming</p>
    <canvas id="hero-chart" class="mx-auto my-6 max-w-xl"></canvas>
    <div class="flex justify-center mt-4">
      <button class="hero-btn">GET STARTED</button>
      <button class="hero-btn">ABOUT US</button>
    </div>
    <div id="tech-section" class="mt-8">
      <h2 class="text-2xl font-bold mb-4 neon-text">OUR TECHNOLOGY</h2>
      <div id="tech-animation" class="h-64"></div>
    </div>
  </section>
  <p class="text-center mt-10 text-gray-300">El inicio de un proyecto futurista sin igual.</p>
  <script>
    function initChart(){
      const ctx = document.getElementById('hero-chart').getContext('2d');
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: [1,2,3,4,5,6],
          datasets: [{
            data: [1,3,2,5,4,6],
            borderColor: '#00ffff',
            borderWidth: 2,
            tension: 0.4,
            pointRadius: 0,
            fill: false
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: { x: { display: false }, y: { display: false } }
        }
      });
    }

    function initTechAnimation() {
      const container = document.getElementById('tech-animation');
      const svgNS = "http://www.w3.org/2000/svg";
      const svg = document.createElementNS(svgNS, 'svg');
      svg.setAttribute("viewBox", "0 0 400 300");
      container.appendChild(svg);
      function clearSVG() {
        while (svg.firstChild) {
          svg.removeChild(svg.firstChild);
        }
      }
      function createDot(cx, cy, r = 5) {
        const circle = document.createElementNS(svgNS, 'circle');
        circle.setAttribute("cx", cx);
        circle.setAttribute("cy", cy);
        circle.setAttribute("r", r);
        circle.setAttribute("fill", "#a5b4fc");
        circle.style.opacity = 0;
        circle.style.transition = "opacity 1s ease-in-out";
        setTimeout(() => { circle.style.opacity = 1; }, 10);
        svg.appendChild(circle);
        return circle;
      }
      function createLine(x1, y1, x2, y2) {
        const line = document.createElementNS(svgNS, 'line');
        line.setAttribute("x1", x1);
        line.setAttribute("y1", y1);
        line.setAttribute("x2", x2);
        line.setAttribute("y2", y2);
        line.setAttribute("stroke", "#a5b4fc");
        line.setAttribute("stroke-width", "1");
        line.style.opacity = 0;
        line.style.transition = "opacity 1s ease-in-out";
        svg.appendChild(line);
        setTimeout(() => { line.style.opacity = 1; }, 10);
        return line;
      }
      let dots = [];
      function animateNetwork() {
        clearSVG();
        dots = [];
        const initial = [
          { cx: 100, cy: 150 },
          { cx: 200, cy: 50 },
          { cx: 300, cy: 150 }
        ];
        initial.forEach(pos => {
          const dot = createDot(pos.cx, pos.cy);
          dots.push({ pos, element: dot });
        });
        createLine(initial[0].cx, initial[0].cy, initial[1].cx, initial[1].cy);
        createLine(initial[1].cx, initial[1].cy, initial[2].cx, initial[2].cy);
        createLine(initial[2].cx, initial[2].cy, initial[0].cx, initial[0].cy);
        const additional = 4;
        const delay = 2000;
        for (let i = 0; i < additional; i++) {
          setTimeout(() => {
            const cx = 50 + Math.random() * 300;
            const cy = 50 + Math.random() * 200;
            const newDot = createDot(cx, cy);
            dots.push({ pos: { cx, cy }, element: newDot });
            for (let j = 0; j < dots.length - 1; j++) {
              createLine(dots[j].pos.cx, dots[j].pos.cy, cx, cy);
            }
          }, delay * (i + 1));
        }
        setTimeout(() => {
          svg.querySelectorAll("line").forEach(line => { line.style.opacity = 0; });
          svg.querySelectorAll("circle").forEach(circle => { circle.style.opacity = 0; });
        }, delay * (additional + 1));
        setTimeout(() => { animateNetwork(); }, delay * (additional + 3));
      }
      animateNetwork();
    }

    document.addEventListener('DOMContentLoaded', () => {
      initChart();
      initTechAnimation();
    });
  </script>
</body>
</html>
