<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects - Singame</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap" rel="stylesheet">
  <script src="../extras/tailwind.js"></script>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to bottom right, #0e112f, #1b1b3a);
      color: #cfd9ff;
    }
    .neon-text {
      text-shadow: 0 0 5px #fff, 0 0 10px #9f6aff, 0 0 20px #9f6aff;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">
  <nav class="sticky top-0 z-50 backdrop-blur-md bg-black bg-opacity-40 text-white shadow-lg">
    <div class="max-w-6xl mx-auto px-4">
      <div class="flex justify-between items-center py-4">
        <a href="index.html" class="text-2xl font-bold tracking-tight">Singame</a>
        <div class="space-x-4">
          <a href="index.html" data-es="Inicio" class="hover:text-indigo-300">Home</a>
          <button id="lang-toggle" class="hero-btn" data-lang="en">ES</button>
        </div>
      </div>
    </div>
  </nav>
  <section class="max-w-5xl mx-auto p-8">
    <h3 class="text-2xl font-bold mb-6" data-es="🎮 Proyectos">🎮 Projects</h3>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <a href="game1/index.html" class="bg-indigo-800 bg-opacity-30 p-6 rounded-lg hover:bg-opacity-50 transition-all block text-center">
        <h4 class="text-xl font-bold mb-2" data-es="Singame Platformer">Singame Platformer</h4>
      </a>
    </div>
  </section>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.querySelectorAll("[data-es]").forEach(el => { el.dataset.en = el.textContent; });
      const toggle = document.getElementById("lang-toggle");
      if (toggle) {
        toggle.addEventListener("click", () => {
          const lang = toggle.dataset.lang === "es" ? "en" : "es";
          toggle.dataset.lang = lang;
          toggle.textContent = lang === "es" ? "EN" : "ES";
          document.querySelectorAll("[data-es]").forEach(el => { el.textContent = el.dataset[lang]; });
        });
      }
    });
  </script>
</body>
</html>
