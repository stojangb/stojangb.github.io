<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game 1</title>
  <script src="../../extras/tailwind.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-white min-h-screen flex flex-col items-center justify-center">
  <canvas id="hero-chart" class="w-full max-w-xl mb-8"></canvas>
  <button id="back-btn" class="bg-indigo-600 text-white px-4 py-2 rounded">Back</button>
  <script>
    const ctx = document.getElementById('hero-chart').getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: [1,2,3,4,5,6],
        datasets: [{
          data: [1,3,2,5,4,6],
          borderColor: '#00ffff',
          borderWidth: 2,
          tension: 0.4,
          pointRadius: 0,
          fill: false
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: { x: { display: false }, y: { display: false } }
      }
    });
    document.getElementById('back-btn').addEventListener('click', () => {
      window.history.back();
    });
  </script>
</body>
</html>
