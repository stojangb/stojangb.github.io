<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Foundation Projects</title>
  <script src="../extras/tailwind.js"></script>
  <style>
    body { background: linear-gradient(to bottom right, #ec4899, #8b5cf6); }
    .section { background: rgba(255,255,255,0.2); }
  </style>
</head>
<body class="min-h-screen text-white flex flex-col">
  <header class="p-4 bg-black bg-opacity-30 flex justify-between items-center">
    <h1 class="text-2xl font-bold"><a href="index.html" data-key="navHome">Home</a></h1>
    <nav>
      <select id="lang-select" class="bg-indigo-600 text-white p-1 rounded">
        <option value="en">EN</option>
        <option value="es">ES</option>
      </select>
    </nav>
  </header>
  <main class="flex-grow p-6 space-y-10">
    <section class="section p-6 rounded-lg shadow-lg">
      <h2 class="text-3xl font-bold mb-4" data-key="projectsTitle">Projects</h2>
      <div class="space-y-6" id="projects-list"></div>
    </section>
  </main>
  <footer class="text-center py-4 bg-black bg-opacity-30 text-sm">
    © 2025 Stojan Gasic
  </footer>
  <script>
const projects = [
  { key:'p1', goal:40000 },
  { key:'p2', goal:2000 },
  { key:'p3', goal:30000 },
  { key:'p4', goal:2000 }
];
const translations = {
  en: {
    navHome:'Home',
    projectsTitle:'Projects',
    p1:'Exercise machines that reward your effort with food.',
    p2:'City cleanup campaigns gathering volunteers and providing materials.',
    p3:'Development of ethical open-source and AI tools to detect corruption, improve access to justice and simplify municipal processes.',
    p4:'Connecting people and organizations that provide help to those in need.',
    goal:'Goal'
  },
  es: {
    navHome:'Inicio',
    projectsTitle:'Proyectos',
    p1:'Dinámicas como máquinas de ejercicio que recompensen tu esfuerzo con comida.',
    p2:'Campañas de limpieza urbana reuniendo voluntarios y proveyendo materiales.',
    p3:'Desarrollo de herramientas éticas de software libre e IA para detectar corrupción, mejorar el acceso a la justicia y simplificar procesos municipales.',
    p4:'Conectar personas y organizaciones locales que brindan ayuda a quienes necesiten.',
    goal:'Meta'
  }
};
function render(lang){
  document.documentElement.lang=lang;
  const t = translations[lang];
  document.querySelector('[data-key="navHome"]').textContent=t.navHome;
  document.querySelector('[data-key="projectsTitle"]').textContent=t.projectsTitle;
  const list=document.getElementById('projects-list');
  list.innerHTML='';
  projects.forEach(p=>{
    const wrapper=document.createElement('div');
    wrapper.innerHTML=`<p class='font-semibold mb-2'>${t[p.key]} - ${t.goal}: €${p.goal}</p>
    <div class='w-full bg-white bg-opacity-40 h-4 rounded'>
      <div class='bg-green-500 h-4 rounded' style='width:0%'></div>
    </div>`;
    list.appendChild(wrapper);
  });
  document.getElementById('lang-select').value=lang;
}

document.getElementById('lang-select').addEventListener('change',e=>render(e.target.value));
document.addEventListener('DOMContentLoaded',()=>render('en'));
  </script>
</body>
</html>
