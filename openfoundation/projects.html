<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Examples of initiatives run by the Open Foundation" />
  <title>Open Foundation Projects</title>
  <script src="../extras/tailwind.js"></script>
  <style>
    body { background: linear-gradient(to bottom right, #ec4899, #8b5cf6); }
    .section { background: rgba(255,255,255,0.2); }
  </style>
</head>
<body class="min-h-screen text-white flex flex-col">
  <header class="p-4 bg-black bg-opacity-30 flex justify-between items-center">
    <h1 class="text-2xl font-bold"><a href="index.html" data-key="navHome">Home</a></h1>
    <nav>
      <select id="lang-select" class="bg-indigo-600 text-white p-1 rounded">
        <option value="en">EN</option>
        <option value="es">ES</option>
      </select>
    </nav>
  </header>
  <main class="flex-grow p-6 space-y-10">
    <section class="section p-6 rounded-lg shadow-lg">
      <h2 class="text-3xl font-bold mb-4" data-key="projectsTitle">Projects</h2>
      <div class="space-y-6" id="projects-list"></div>
    </section>
  </main>
  <footer class="text-center py-4 bg-black bg-opacity-30 text-sm">
    © 2025 Stojan Gasic
  </footer>
  <script>
const projects=[
  {key:'p1',goal:40000,raised:12400,status:'statusActive'},
  {key:'p2',goal:2000,raised:1350,status:'statusPlanning'},
  {key:'p3',goal:30000,raised:9800,status:'statusBuild'},
  {key:'p4',goal:2000,raised:1520,status:'statusActive'}
];
let translations={};
async function loadTranslations(){
  const res=await fetch('i18n/projects.json');
  translations=await res.json();
}
function getPercent(raised,goal){
  return Math.min(100,Math.round((raised/goal)*100));
}
function render(lang){
  document.documentElement.lang=lang;
  const t=translations[lang];
  document.querySelector('[data-key="navHome"]').textContent=t.navHome;
  document.querySelector('[data-key="projectsTitle"]').innerHTML=`${t.projectsTitle}<span class="block mt-2 text-base font-normal opacity-90">${t.projectsIntro}</span>`;
  const list=document.getElementById('projects-list');
  list.innerHTML='';
  projects.forEach(p=>{
    const progress=getPercent(p.raised,p.goal);
    const wrapper=document.createElement('div');
    wrapper.className='bg-black bg-opacity-20 rounded-xl p-5 border border-white border-opacity-20';
    wrapper.innerHTML=`
      <div class='flex flex-wrap gap-3 items-center justify-between mb-3'>
        <h3 class='text-xl font-bold'>${t[`${p.key}Title`]}</h3>
        <span class='text-xs px-3 py-1 rounded-full bg-indigo-500 bg-opacity-80 uppercase tracking-wide'>${t.statusLabel}: ${t[p.status]}</span>
      </div>
      <p class='mb-3 opacity-95'>${t[p.key]}</p>
      <p class='text-sm mb-3'><span class='font-semibold'>${t.impactLabel}:</span> ${t[`${p.key}Impact`]}</p>
      <div class='mb-2 flex justify-between text-sm'>
        <span>${t.raised}: €${p.raised.toLocaleString()}</span>
        <span>${t.goal}: €${p.goal.toLocaleString()}</span>
      </div>
      <div class='w-full bg-white bg-opacity-40 h-4 rounded mb-1 overflow-hidden'>
        <div class='bg-green-500 h-4 rounded' style='width:${progress}%'></div>
      </div>
      <p class='text-xs mb-3'>${t.progressLabel}: ${progress}%</p>
      <p class='font-semibold text-sm mb-1'>${t.milestonesLabel}</p>
      <ul class='list-disc ml-5 text-sm space-y-1 opacity-95'>
        <li>${t[`${p.key}Milestone1`]}</li>
        <li>${t[`${p.key}Milestone2`]}</li>
        <li>${t[`${p.key}Milestone3`]}</li>
      </ul>
    `;
    list.appendChild(wrapper);
  });
  document.getElementById('lang-select').value=lang;
}
document.getElementById('lang-select').addEventListener('change',e=>render(e.target.value));
document.addEventListener('DOMContentLoaded',async()=>{await loadTranslations();render('en');});
  </script>
</body>
</html>
